<html lang="pt-BR">
<head>

<title>Boa Noite</title>
<meta name="theme-color" content="#0B1330">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<style>
  :root{
    --bg-deep:#0B1330;
    --bg-mid:#141B4D;
    --gold:#F4C572;
    --lavender:#C9CEEA;
    --lavender-dim:#8B92C4;
    --rose:#E8879C;
    --card-bg:rgba(255,255,255,0.05);
    --card-border:rgba(244,197,114,0.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse 90% 60% at 20% -10%, rgba(244,197,114,0.10), transparent 60%),
      radial-gradient(ellipse 70% 50% at 90% 0%, rgba(232,135,156,0.08), transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 55%, #0B1330 100%);
    font-family:'Inter', -apple-system, sans-serif;
    color:var(--lavender);
    overflow-x:hidden;
    position:relative;
  }
  #stars{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }
  .star{
    position:absolute; background:#fff; border-radius:50%;
    animation:twinkle 4s ease-in-out infinite;
    opacity:0.5;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15; transform:scale(0.8);}
    50%{opacity:0.9; transform:scale(1.15);}
  }
  .wrap{
    position:relative; z-index:1;
    max-width:480px; margin:0 auto;
    padding:44px 20px 40px;
    min-height:100vh;
    display:flex; flex-direction:column;
  }
  header{
    text-align:center;
    margin-bottom:34px;
  }
  .moon{
    width:56px; height:56px; margin:0 auto 14px;
    position:relative;
  }
  .moon svg{ width:100%; height:100%; filter:drop-shadow(0 0 18px rgba(244,197,114,0.45)); }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:2.3rem;
    margin:0 0 6px;
    letter-spacing:0.01em;
    background:linear-gradient(180deg, #FDEBC8, var(--gold));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .subtitle{
    font-size:0.92rem;
    color:var(--lavender-dim);
    margin:0;
    letter-spacing:0.02em;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:22px;
  }
  .cat-card{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:18px;
    padding:22px 12px 18px;
    text-align:center;
    cursor:pointer;
    transition:transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    -webkit-user-select:none; user-select:none;
    backdrop-filter:blur(6px);
  }
  .cat-card:active{ transform:scale(0.96); background:rgba(255,255,255,0.09); }
  .cat-card:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .cat-icon{ font-size:1.7rem; display:block; margin-bottom:8px; }
  .cat-label{ font-size:0.88rem; font-weight:500; color:var(--lavender); }

  .cat-card[data-cat="amor"] .cat-label{ color:var(--rose); }
  .cat-card[data-cat="amor"]{ border-color:rgba(232,135,156,0.22); }

  #panel{
    display:none;
    flex:1;
    flex-direction:column;
  }
  #panel.active{ display:flex; }
  .grid.hidden{ display:none; }

  .back-btn{
    background:none; border:none; color:var(--lavender-dim);
    font-family:'Inter', sans-serif; font-size:0.85rem;
    display:flex; align-items:center; gap:6px;
    padding:8px 0; margin-bottom:16px; cursor:pointer;
    align-self:flex-start;
  }
  .back-btn:active{ opacity:0.6; }

  .msg-card{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:20px;
    padding:28px 22px;
    flex:1;
    display:flex;
    align-items:center;
    min-height:180px;
    backdrop-filter:blur(6px);
  }
  .msg-text{
    font-family:'Fraunces', serif;
    font-size:1.18rem;
    line-height:1.55;
    color:#FBF6EA;
    font-weight:400;
  }
  .actions{
    display:flex; gap:10px; margin-top:18px;
  }
  .btn{
    flex:1;
    border:none; border-radius:14px;
    padding:14px 10px;
    font-family:'Inter', sans-serif; font-size:0.86rem; font-weight:600;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:transform 0.12s ease, opacity 0.2s ease;
  }
  .btn:active{ transform:scale(0.96); }
  .btn-primary{
    background:linear-gradient(135deg, var(--gold), #E8A83F);
    color:#221505;
  }
  .btn-secondary{
    background:rgba(255,255,255,0.08);
    color:var(--lavender);
    border:1px solid var(--card-border);
  }
  .copied-toast{
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#1c2456; color:var(--gold);
    padding:10px 20px; border-radius:30px;
    font-size:0.85rem; font-weight:500;
    opacity:0; transition:opacity 0.25s ease, transform 0.25s ease;
    pointer-events:none; z-index:20;
    border:1px solid rgba(244,197,114,0.3);
  }
  .copied-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  footer{
    text-align:center;
    margin-top:auto;
    padding-top:30px;
    font-size:0.72rem;
    color:rgba(139,146,196,0.5);
    letter-spacing:0.03em;
  }

  @media (prefers-reduced-motion: reduce){
    .star{ animation:none; opacity:0.4; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="wrap">

    <div class="moon">

  </div>

</div>

// stars background
(function(){
  const starsEl = document.getElementById('stars');
  const n = 50;
  for(let i=0;i<n;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*2+1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*70+'%';
    s.style.animationDelay = (Math.random()*4)+'s';
    s.style.animationDuration = (3+Math.random()*3)+'s';
    starsEl.appendChild(s);
  }
})();

function getUsedKey(cat){ return 'boanoite_used_' + cat; }

function pickMessage(cat){
  const all = MESSAGES[cat];
  const key = getUsedKey(cat);
  let used = JSON.parse(localStorage.getItem(key) || '[]');
  let available = all.map((_,i)=>i).filter(i => !used.includes(i));
  if(available.length === 0){
    used = [];
    available = all.map((_,i)=>i);
  }
  const idx = available[Math.floor(Math.random()*available.length)];
  used.push(idx);
  localStorage.setItem(key, JSON.stringify(used));
  return all[idx];
}

const grid = document.getElementById('grid');
const panel = document.getElementById('panel');
const msgText = document.getElementById('msgText');
const backBtn = document.getElementById('backBtn');
const newMsgBtn = document.getElementById('newMsgBtn');
const copyBtn = document.getElementById('copyBtn');
const shareBtn = document.getElementById('shareBtn');
const toast = document.getElementById('toast');

let currentCat = null;

function showMessage(cat){
  currentCat = cat;
  msgText.textContent = pickMessage(cat);
  grid.classList.add('hidden');
  panel.classList.add('active');
}

grid.querySelectorAll('.cat-card').forEach(card=>{
  card.addEventListener('click', ()=> showMessage(card.dataset.cat));
  card.addEventListener('keydown', e=>{
    if(e.key==='Enter' || e.key===' '){ e.preventDefault(); showMessage(card.dataset.cat); }
  });
});

backBtn.addEventListener('click', ()=>{
  panel.classList.remove('active');
  grid.classList.remove('hidden');
});

newMsgBtn.addEventListener('click', ()=>{
  if(currentCat) msgText.textContent = pickMessage(currentCat);
});

function showToast(text){
  toast.textContent = text;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 1600);
}

copyBtn.addEventListener('click', async ()=>{
  try{
    await navigator.clipboard.writeText(msgText.textContent);
    showToast('Copiado!');
  }catch(e){
    showToast('Não foi possível copiar');
  }
});

shareBtn.addEventListener('click', ()=>{
  const text = encodeURIComponent(msgText.textContent);
  window.open('https://wa.me/?text='+text, '_blank');
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
