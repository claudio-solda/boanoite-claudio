<div id="digitalLockScreen" style="position:fixed;inset:0;background:#0f172a;color:#fff;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;font-family:-apple-system,Segoe UI,Roboto,sans-serif;text-align:center;padding:24px;">

  <button id="digitalLockBtn" style="padding:14px 30px;font-size:16px;border-radius:12px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-weight:600;">Desbloquear</button>
</div>
<script>
(function(){
  var LOCK_KEY = 'claudio_digital_cred_id';
  var overlay = document.getElementById('digitalLockScreen');
  var msg = document.getElementById('digitalLockMsg');
  var btn = document.getElementById('digitalLockBtn');

  function unlock(){ overlay.style.display = 'none'; }

  function b64urlToBuf(b64url){
    var b64 = b64url.replace(/-/g,'+').replace(/_/g,'/');
    var pad = b64.length % 4 === 0 ? '' : '='.repeat(4 - (b64.length % 4));
    var bin = atob(b64+pad);
    var buf = new Uint8Array(bin.length);
    for (var i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
    return buf;
  }
  function bufToB64url(buf){
    var bin=''; var bytes = new Uint8Array(buf);
    for (var i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }

  function register(){
    msg.textContent = 'Cadastrando sua digital...';
    var challenge = crypto.getRandomValues(new Uint8Array(32));
    var userId = crypto.getRandomValues(new Uint8Array(16));
    navigator.credentials.create({
      publicKey: {
        challenge: challenge,
        rp: { name: 'Apps do Claudio' },
        user: { id: userId, name: 'claudio', displayName: 'Claudio' },
        pubKeyCredParams: [{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
        authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
        timeout: 60000,
        attestation: 'none'
      }
    }).then(function(cred){
      localStorage.setItem(LOCK_KEY, bufToB64url(cred.rawId));
      unlock();
    }).catch(function(e){
      msg.textContent = 'Não foi possível cadastrar. Toque para tentar de novo.';
      console.error(e);
    });
  }

  function authenticate(credId){
    msg.textContent = 'Toque no sensor de digital...';
    var challenge = crypto.getRandomValues(new Uint8Array(32));
    navigator.credentials.get({
      publicKey: {
        challenge: challenge,
        allowCredentials: [{ id: b64urlToBuf(credId), type: 'public-key' }],
        userVerification: 'required',
        timeout: 60000
      }
    }).then(function(){ unlock(); })
    .catch(function(e){
      msg.textContent = 'Digital não reconhecida. Toque para tentar de novo.';
      console.error(e);
    });
  }

  function init(){
    if (!window.PublicKeyCredential){
      msg.textContent = 'Navegador sem suporte a digital. Acesso liberado.';
      setTimeout(unlock, 1200);
      return;
    }
    var credId = localStorage.getItem(LOCK_KEY);
    if (credId){
      msg.textContent = 'Toque para desbloquear com sua digital';
      btn.textContent = 'Desbloquear';
      btn.onclick = function(){ authenticate(credId); };
    } else {
      msg.textContent = 'Cadastre sua digital para proteger este app';
      btn.textContent = 'Cadastrar digital';
      btn.onclick = register;
    }
  }
  init();
})();
</script>

function desenharCena(msg, tema) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = 420, H = 420;

  // Gradiente céu noturno
  const gradCeu = ctx.createLinearGradient(0, 0, 0, H * 0.75);
  gradCeu.addColorStop(0, tema.ceu1);
  gradCeu.addColorStop(0.5, tema.ceu2);
  gradCeu.addColorStop(1, tema.horizonte);
  ctx.fillStyle = gradCeu;
  ctx.fillRect(0, 0, W, H);

  // Estrelas espalhadas
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  const estrelas = [[40,30],[80,15],[150,25],[220,10],[290,20],[350,35],[390,15],[60,60],[180,50],[310,55],[336,40],[20,90],[110,95],[250,85],[380,80],[140,110],[200,105]];
  estrelas.forEach(([x,y]) => {
    ctx.beginPath();
    ctx.arc(x, y, Math.random()*1.2+0.8, 0, Math.PI*2);
    ctx.fill();
  });

  // Lua com brilho
  const luaX = W / 2, luaY = H * 0.42;
  const gradGlow = ctx.createRadialGradient(luaX, luaY, 10, luaX, luaY, 90);
  gradGlow.addColorStop(0, 'rgba(255,255,255,0.35)');
  gradGlow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gradGlow;
  ctx.beginPath();
  ctx.arc(luaX, luaY, 90, 0, Math.PI*2);
  ctx.fill();

  const gradLua = ctx.createRadialGradient(luaX-12, luaY-12, 5, luaX, luaY, 46);
  gradLua.addColorStop(0, '#FFFFFF');
  gradLua.addColorStop(0.5, tema.lua);
  gradLua.addColorStop(1, tema.horizonte);
  ctx.fillStyle = gradLua;
  ctx.beginPath();
  ctx.arc(luaX, luaY, 46, 0, Math.PI*2);
  ctx.fill();

  // Crateras da lua
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  [[luaX-16,luaY-10,8],[luaX+10,luaY+14,6],[luaX+18,luaY-16,4],[luaX-6,luaY+18,5]].forEach(([x,y,r]) => {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
  });

  // Colinas
  ctx.fillStyle = '#050512';
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, H*0.72);
  ctx.quadraticCurveTo(W*0.25, H*0.58, W*0.5, H*0.65);
  ctx.quadraticCurveTo(W*0.75, H*0.72, W, H*0.62);
  ctx.lineTo(W, H);
  ctx.fill();

  // Árvores esquerda
  [[30,H*0.72],[60,H*0.68],[90,H*0.70]].forEach(([x,y]) => {
    ctx.fillStyle = '#050512';
    ctx.beginPath();
    ctx.moveTo(x, y-40);
    ctx.lineTo(x-12, y);
    ctx.lineTo(x+12, y);
    ctx.fill();
  });

  // Árvores direita
  [[W-30,H*0.65],[W-60,H*0.62],[W-90,H*0.67]].forEach(([x,y]) => {
    ctx.fillStyle = '#050512';
    ctx.beginPath();
    ctx.moveTo(x, y-40);
    ctx.lineTo(x-12, y);
    ctx.lineTo(x+12, y);
    ctx.fill();
  });

  // Texto "* que a noite seja *"
  ctx.fillStyle = tema.sub_cor;
  ctx.font = 'italic 14px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('* que a noite seja *', W/2, 80);

  // BOA NOITE
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.font = 'bold 52px Georgia';
  ctx.fillText('Boa Noite', W/2+2, 142);
  ctx.fillStyle = tema.frase_cor;
  ctx.font = 'bold 52px Georgia';
  ctx.fillText('Boa Noite', W/2, 140);

  // Sub
  ctx.fillStyle = tema.sub_cor;
  ctx.font = 'italic 20px Georgia';
  ctx.fillText(msg.sub, W/2, 172);

  // Linha
  ctx.strokeStyle = tema.sub_cor;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(W/2 - 140, 182);
  ctx.lineTo(W/2 + 140, 182);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Frase
  ctx.fillStyle = tema.frase_cor;
  ctx.font = '15px Georgia';
  const linhas = msg.frase.split('\n');
  linhas.forEach((linha, i) => {
    ctx.fillText(linha, W/2, 210 + i * 24);
  });
}

function mostrarMensagem(index) {
  const lista = getMensagens();
  const msg = lista[index % lista.length];
  const tema = TEMAS[index % TEMAS.length];
  desenharCena(msg, tema);
  indexAtual = index;
}

function sortearSemRepetir() {
  const lista = getMensagens();
  const chave = 'boanoite_usados_' + assinatura;
  let usados = [];
  try { usados = JSON.parse(localStorage.getItem(chave)) || []; } catch(e) { usados = []; }
  if (!Array.isArray(usados) || usados.length >= lista.length) usados = [];
  const disponiveis = lista.map((_, i) => i).filter(i => !usados.includes(i));
  const escolhido = disponiveis[Math.floor(Math.random() * disponiveis.length)];
  usados.push(escolhido);
  try { localStorage.setItem(chave, JSON.stringify(usados)); } catch(e) {}
  mostrarMensagem(escolhido);
}

function proximaMensagem() {
  sortearSemRepetir();
}

let assinatura = 'irmao';

function setAssinatura(tipo) {
  assinatura = tipo;
  ['claudio', 'irmao', 'kimberly', 'priscila'].forEach(t => {
    const btn = document.getElementById('btn-' + t);
    const ativo = t === tipo;
    btn.style.background = ativo ? '#6f6ff7' : '#24245a';
    btn.style.color = ativo ? '#fff' : '#a9a3ff';
    btn.style.fontWeight = ativo ? 'bold' : 'normal';
    btn.style.borderColor = ativo ? '#6f6ff7' : '#3a3a8a';
  });
  sortearSemRepetir();
}

function compartilhar() {
  const lista = getMensagens();
  const msg = lista[indexAtual % lista.length];
  const nome = assinatura === 'irmao' ? 'Irmão Claudio 🙏' : (assinatura === 'kimberly' ? 'Papai ❤️' : (assinatura === 'priscila' ? 'Seu amor ❤️' : 'Claudio 😊'));
  const texto = `🌙 *Boa Noite!* 🌙\n\n_${msg.sub}_\n\n${msg.frase.replace(/\n/g, ' ')}\n\n✨ _Enviado com carinho por ${nome}_`;
  const canvas = document.getElementById('canvas');

  // Tenta compartilhar com imagem (Web Share API nível 2)
  if (navigator.canShare) {
    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'boanoite.png', { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], text: texto });
          return;
        } catch(e) {
          // usuário cancelou ou erro, cai no fallback
        }
      }
      // fallback: só texto
      const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
      window.open(url, '_blank');
    }, 'image/png');
  } else {
    // fallback para navegadores sem suporte
    const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
    window.open(url, '_blank');
  }
}
